security:
  - id: auth_path
    patterns:
      - /auth/
      - /authentication/
      - /login/
      - /oauth/
    adjustment: -0.3
    reason: Authentication logic requires careful review
    target: path
    match: substring
    enforce: true
  - id: secrets_handling
    patterns:
      - api_key
      - private_key
      - client_secret
      - secret_key
      - access_key
      - aws_secret
      - -----BEGIN
      - regex:(password|passwd|secret|token|api[_-]?key|access[_-]?key)\s*[:=]\s*["']
    adjustment: -0.4
    reason: Credential/secret material is security-critical
    target: content
    enforce: true
  - id: crypto_ops
    patterns:
      - encrypt(
      - decrypt(
      - createcipher
      - createhmac
      - pbkdf2
    adjustment: -0.25
    reason: Cryptographic operations need expert review
    target: content
    match: substring
  - id: raw_sql
    patterns:
      - rawquery
      - executesql
      - select * from
      - delete from
      - drop table
    adjustment: -0.35
    reason: Raw SQL may be vulnerable to injection
    target: content
    match: substring
  - id: env_files
    patterns:
      - regex:(^|/)\.env(\.[^/]*)?$
      - config/secrets
      - credentials
    adjustment: -0.45
    reason: Environment files contain sensitive configuration
    target: path
    enforce: true
  - id: permission_changes
    patterns:
      - chmod
      - chown
      - setuid
      - setgid
    adjustment: -0.3
    reason: Permission changes affect security posture
    target: content
    match: substring
    enforce: true
infrastructure:
  - id: ci_cd_changes
    patterns:
      - .github/workflows
      - ci.yml
      - release.yml
      - .gitlab-ci
    adjustment: -0.2
    reason: CI/CD changes impact release safety
    target: path
    match: substring
    enforce: true
  - id: docker_changes
    patterns:
      - Dockerfile
      - docker-compose
      - /containers/
    adjustment: -0.25
    reason: Container changes can affect deployment
    target: path
    match: substring
    enforce: true
  - id: infra_as_code
    patterns:
      - terraform
      - pulumi
      - cloudformation
      - kubernetes
    adjustment: -0.3
    reason: Infrastructure as code requires review
    target: content
    match: substring
  - id: secrets_manager
    patterns:
      - vault
      - secrets manager
      - key vault
    adjustment: -0.3
    reason: Secrets management changes are high impact
    target: content
    match: substring
data:
  - id: schema_migration
    patterns:
      - /migrations/
      - alter table
      - drop column
    adjustment: -0.25
    reason: Schema changes require careful review
    target: any
    match: substring
    enforce: true
  - id: pii_handling
    patterns:
      - ssn
      - social security
      - passport
      - credit card
    adjustment: -0.4
    reason: PII handling is regulated
    target: content
    match: substring
    enforce: true
  - id: data_exports
    patterns:
      - mysqldump
      - pg_dump
      - data export
      - .bak
    adjustment: -0.2
    reason: Bulk data export operations are sensitive
    target: content
    match: substring
testing:
  - id: test_coverage
    patterns:
      - coverage-final
      - lcov.info
      - .nyc_output
    adjustment: -0.1
    reason: Coverage artifacts may affect quality reporting
    target: path
    match: substring
  - id: snapshot_update
    patterns:
      - .snap
      - __snapshots__
    adjustment: -0.15
    reason: Snapshot updates should be reviewed
    target: path
    match: substring
hard_stops:
  - id: destroy_infra
    patterns:
      - regex:(terraform|pulumi)\s+destroy
      - regex:terraform\s+apply\s+-destroy
    adjustment: -1
    reason: "NBB HARD STOP (Tier 5): infrastructure destroy -- present to a human,
      never auto-execute"
    target: content
    enforce: true
  - id: drop_database
    patterns:
      - regex:drop\s+database\b
      - regex:drop\s+schema\s+.*cascade
    adjustment: -1
    reason: "NBB HARD STOP (Tier 5): destructive database drop"
    target: content
    enforce: true
  - id: force_reset
    patterns:
      - regex:(db\s+push|migrate|reset)\s+[^\n]*--force(-reset)?
      - --force-reset
      - --no-confirm
    adjustment: -0.8
    reason: "NBB HARD STOP (Tier 5): production force-reset / confirmation bypass"
    target: content
    enforce: true
  - id: rm_rf_root
    patterns:
      - regex:rm\s+(-[a-z]+\s+){1,3}(--no-preserve-root\s+)?(/|~|\$HOME)(\s|$)
      - regex:rm\s+(--[a-z-]+\s+){1,3}(/|~|\$HOME)(\s|$)
    adjustment: -1
    reason: "NBB HARD STOP (Tier 5): rm -rf on root/home"
    target: content
    enforce: true
  - id: force_push
    patterns:
      - regex:git\s+push\s+[^\n]*(--force|-f)\b
      - git clean -fdx
    adjustment: -0.6
    reason: "NBB HARD STOP (Tier 4): force-push / git clean -fdx -- blast-radius
      assessment + human confirm"
    target: content
    enforce: true
