version: "1.0"
governance:
  profile: "enterprise"
confidence:
  factors:
    specification_clarity:
      weight: 0.25
      description: "How clear is the task?"
    solution_certainty:
      weight: 0.25
      description: "How confident in the approach?"
    reversibility:
      weight: 0.20
      description: "How easy to undo if wrong?"
    scope_containment:
      weight: 0.15
      description: "How isolated is the change?"
    precedent_available:
      weight: 0.15
      description: "Have similar changes been done before?"
  thresholds:
    high: 0.85
    medium: 0.60
    low: 0.35
    uncertain: 0.0
autonomy:
  default_level: 4
  escalation_paths:
    - condition: "confidence < 0.35"
      action: "require_human_approval"
    - condition: "anchor_triggered"
      action: "explain_and_confirm"
    - condition: "security_anchor"
      action: "require_security_review"
tools:
  enabled: ["claude", "cursor", "codex"]
